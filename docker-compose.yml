version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zeroshield-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app/backend
      - ./simulator:/app/simulator
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/zeroshield-ui/Dockerfile
    container_name: zeroshield-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/zeroshield-ui:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
